<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="style_prak_3.css">
</head>

<body>
    <div id="search">
        <div class="title">
            <h1>CAR <br> RENTAL</h1>
            <p class="p_sub_judul_h1">Find the perfect car for your next adventure</p>
            <hr>
        </div>
        
        <div class="form-container">
            <div class="form-group">
                <label for="pickup">Rental Location:</label>
                <select id="pickup" name="pickup">
                    <option value="">Select Location</option>
                    <option value="location1">Yogyakarta</option>
                    <option value="location2">Bali</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pickup-date">Rental Start Date:</label>
                <input type="date" id="pickup-date" name="pickup-date">
            </div>
            <div class="form-group">
                <label for="return-date">Rental End Date:</label>
                <input type="date" id="return-date" name="return-date">
            </div>
            <button type="submit">Search</button>
        </div>

        <div class="decor_header">
            p
        </div>

    </div>

    <div class="car-list">
        <h2>Katalog</h2>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/2b/87/fd/2b87fda69abafa6a5c38b5ef077f9e93.jpg" alt="Car 1">
            <h3>PORCHE 911</h3>
            <p>Car Detail</p>
        </div>

            <img src="https://i.pinimg.com/1200x/bb/3f/4c/bb3f4cd3c6c19f3635123dca8175d5cc.jpg" alt="Car 2">
            <h3>1980 FORD MUSTANG</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/2b/c2/2b/2bc22bf6d3069ffe67235a98c8e84e28.jpg" alt="Car 2">
            <h3>Car 2</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/0d/11/52/0d11527d637a6d6da4b1d64d56bbfd9d.jpg" alt="Car 2">
            <h3>Car 2</h3>
